<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="calcul8tr.page_title">Calcul8tr | AEYCEN Toolbox</title>
    <link rel="icon" type="image/png" href="./assets/img/AEYCEN.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/toolbox-theme.css">
    <link rel="stylesheet" href="./styles/calcul8tr.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
<div class="app">

    <header class="header">
        <div class="logo">
            <span class="logo-href" onclick="window.location.href='index.html'">
                <img src="./assets/img/AEYCEN.png" alt="AEYCEN Logo" width="14">
                AEYCEN Toolbox
            </span>
        </div>
        <h1 data-i18n="calcul8tr.title"></h1>
        <p class="subtitle"><span data-i18n="calcul8tr.desc"></span></p>
    </header>

    <div class="tabs">
        <button class="tab active" data-panel="expr" data-i18n="calcul8tr.tab_expr"></button>
        <button class="tab" data-panel="base" data-i18n="calcul8tr.tab_base"></button>
        <button class="tab" data-panel="unit" data-i18n="calcul8tr.tab_unit"></button>
        <button class="tab" data-panel="pct" data-i18n="calcul8tr.tab_pct"></button>
        <button class="tab" data-panel="stats" data-i18n="calcul8tr.tab_stats"></button>
        <button class="tab" data-panel="date" data-i18n="calcul8tr.tab_date"></button>
    </div>

    <!-- ═══════ PANEL: Expression Calculator ═══════ -->
    <div class="panel active" id="panel-expr">
        <div class="input-section">
            <label class="input-label" for="exprInput" data-i18n="calcul8tr.label_expr"></label>
            <input class="field-input big" type="text" id="exprInput" placeholder="z.B. sqrt(144) + 2^8" autocomplete="off">
            <div class="fn-grid">
                <div class="fn-chip" onclick="insertFn('sqrt(')">√ sqrt</div>
                <div class="fn-chip" onclick="insertFn('cbrt(')">∛ cbrt</div>
                <div class="fn-chip" onclick="insertFn('abs(')">|x| abs</div>
                <div class="fn-chip" onclick="insertFn('log(')">log</div>
                <div class="fn-chip" onclick="insertFn('log2(')">log₂</div>
                <div class="fn-chip" onclick="insertFn('ln(')">ln</div>
                <div class="fn-chip" onclick="insertFn('sin(')">sin</div>
                <div class="fn-chip" onclick="insertFn('cos(')">cos</div>
                <div class="fn-chip" onclick="insertFn('tan(')">tan</div>
                <div class="fn-chip" onclick="insertFn('PI')">π</div>
                <div class="fn-chip" onclick="insertFn('E')">e</div>
                <div class="fn-chip" onclick="insertFn('fact(')">n!</div>
                <div class="fn-chip" onclick="insertFn('round(')">round</div>
                <div class="fn-chip" onclick="insertFn('floor(')">floor</div>
                <div class="fn-chip" onclick="insertFn('ceil(')">ceil</div>
                <div class="fn-chip" onclick="insertFn('**')">xⁿ</div>
                <div class="fn-chip" onclick="insertFn('%')">mod</div>
                <div class="fn-chip" onclick="insertFn('random()')">rand</div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="evalExpr()" data-i18n="calcul8tr.btn_calc"></button>
            <button class="btn" onclick="document.getElementById('exprInput').value=''; document.getElementById('exprInput').focus();" data-i18n="calcul8tr.btn_clear"></button>
        </div>
        <div class="result-section">
            <div class="result-header">
                <label class="input-label" data-i18n="calcul8tr.label_result"></label>
                <button class="copy-btn" onclick="copyText(document.getElementById('exprValue')?.textContent, this)" data-i18n="common.copy" data-i18n="common.copy"></button>
            </div>
            <div id="exprEmptyState" class="empty-state">Unterstützt: +, -, *, /, **, %, sqrt, sin, cos, log, PI, E, fact() …</div>
            <div id="exprResultWrap" style="display:none;">
                <div class="expr-result">
                    <div class="label">Ergebnis</div>
                    <div id="exprValue"></div>
                </div>
            </div>
            <div class="expr-history" id="exprHistory"></div>
        </div>
    </div>

    <!-- ═══════ PANEL: Number Base Converter ═══════ -->
    <div class="panel" id="panel-base">
        <div class="input-section">
            <div class="field-group">
                <label class="input-label" for="baseInput" data-i18n="calcul8tr.label_base_input"></label>
                <input class="field-input big" type="text" id="baseInput" placeholder="z.B. 255" oninput="convertBase()">
            </div>
            <div class="field-group">
                <label class="input-label" for="baseFrom" data-i18n="calcul8tr.label_base_system"></label>
                <select class="field-select" id="baseFrom" onchange="convertBase()">
                    <option value="10" data-i18n="calcul8tr.base_decimal"></option>
                    <option value="2" data-i18n="calcul8tr.base_binary"></option>
                    <option value="8" data-i18n="calcul8tr.base_octal"></option>
                    <option value="16" data-i18n="calcul8tr.base_hex"></option>
                </select>
            </div>
        </div>
        <div class="result-section">
            <div class="result-header">
                <label class="input-label" data-i18n="calcul8tr.label_conversion"></label>
            </div>
            <div id="baseEmptyState" class="empty-state"><span data-i18n="calcul8tr.empty_base"></span></div>
            <div class="base-grid" id="baseGrid" style="display:none;"></div>
        </div>
    </div>

    <!-- ═══════ PANEL: Unit Converter ═══════ -->
    <div class="panel" id="panel-unit">
        <div class="input-section">
            <div class="field-group">
                <label class="input-label" for="unitCategory" data-i18n="calcul8tr.label_category"></label>
                <select class="field-select" id="unitCategory" onchange="populateUnits()">
                    <option value="length" data-i18n="calcul8tr.cat_length"></option>
                    <option value="weight" data-i18n="calcul8tr.cat_weight"></option>
                    <option value="temperature" data-i18n="calcul8tr.cat_temperature"></option>
                    <option value="data" data-i18n="calcul8tr.cat_data"></option>
                    <option value="time" data-i18n="calcul8tr.cat_time"></option>
                    <option value="area" data-i18n="calcul8tr.cat_area"></option>
                    <option value="volume" data-i18n="calcul8tr.cat_volume"></option>
                    <option value="speed" data-i18n="calcul8tr.cat_speed"></option>
                </select>
            </div>
            <div class="conv-layout">
                <div>
                    <div class="field-group">
                        <label class="input-label" data-i18n="calcul8tr.label_value"></label>
                        <input class="field-input" type="number" id="unitValue" placeholder="0" oninput="convertUnit()" step="any">
                    </div>
                    <div class="field-group">
                        <label class="input-label" data-i18n="calcul8tr.label_from" data-i18n="calcul8tr.label_date_from"></label>
                        <select class="field-select" id="unitFrom" onchange="onUnitFromChange()"></select>
                    </div>
                </div>
                <div class="conv-arrow">→</div>
                <div>
                    <div class="field-group">
                        <label class="input-label">&nbsp;</label>
                        <div class="field-input" id="unitResultField" style="color: var(--accent); font-weight: 700; min-height: 48px; display: flex; align-items: center; justify-content: flex-end;">—</div>
                    </div>
                    <div class="field-group">
                        <label class="input-label" data-i18n="calcul8tr.label_to"></label>
                        <select class="field-select" id="unitTo" onchange="onUnitToChange()"></select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════ PANEL: Percentage Calculator ═══════ -->
    <div class="panel" id="panel-pct">
        <div class="pct-modes">
            <div class="pct-mode">
                <div class="pct-mode-title" data-i18n="calcul8tr.pct_title1"></div>
                <div class="pct-inline">
                    <span>Was sind</span>
                    <input type="number" id="pct1x" oninput="calcPct1()" step="any">
                    <span>% von</span>
                    <input type="number" id="pct1y" oninput="calcPct1()" step="any">
                    <span>=</span>
                    <span class="pct-result-inline" id="pct1r">—</span>
                </div>
            </div>
            <div class="pct-mode">
                <div class="pct-mode-title" data-i18n="calcul8tr.pct_title2"></div>
                <div class="pct-inline">
                    <input type="number" id="pct2x" oninput="calcPct2()" step="any">
                    <span>ist</span>
                    <span class="pct-result-inline" id="pct2r">—</span>
                    <span>% von</span>
                    <input type="number" id="pct2y" oninput="calcPct2()" step="any">
                </div>
            </div>
            <div class="pct-mode">
                <div class="pct-mode-title" data-i18n="calcul8tr.pct_title3"></div>
                <div class="pct-inline">
                    <span data-i18n="calcul8tr.label_date_from"></span>
                    <input type="number" id="pct3from" oninput="calcPct3()" step="any">
                    <span>nach</span>
                    <input type="number" id="pct3to" oninput="calcPct3()" step="any">
                    <span>=</span>
                    <span class="pct-result-inline" id="pct3r">—</span>
                </div>
            </div>
            <div class="pct-mode">
                <div class="pct-mode-title" data-i18n="calcul8tr.pct_title4"></div>
                <div class="pct-inline">
                    <input type="number" id="pct4val" oninput="calcPct4()" step="any">
                    <span>+</span>
                    <input type="number" id="pct4pct" oninput="calcPct4()" step="any">
                    <span>%</span>
                    <span>=</span>
                    <span class="pct-result-inline" id="pct4r">—</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════ PANEL: Statistics ═══════ -->
    <div class="panel" id="panel-stats">
        <div class="input-section">
            <div class="field-group">
                <label class="input-label" for="statsInput" data-i18n="calcul8tr.label_stats_input"></label>
                <input class="field-input" type="text" id="statsInput" placeholder="z.B. 12, 45, 67, 23, 89, 34, 56">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-accent3" onclick="calcStats()" data-i18n="calcul8tr.btn_stats"></button>
        </div>
        <div class="result-section">
            <div class="result-header">
                <label class="input-label" style="color: var(--accent3);" data-i18n="calcul8tr.label_statistics"></label>
            </div>
            <div id="statsEmptyState" class="empty-state"><span data-i18n="calcul8tr.empty_stats"></span></div>
            <div id="statsResultWrap" style="display:none;">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="sorted-values" id="statsSorted"></div>
            </div>
        </div>
    </div>

    <!-- ═══════ PANEL: Date Calculator ═══════ -->
    <div class="panel" id="panel-date">
        <div class="input-section">
            <label class="input-label" style="margin-bottom: 14px; display: block;" data-i18n="calcul8tr.label_date_diff"></label>
            <div class="conv-layout">
                <div class="field-group">
                    <label class="input-label" data-i18n="calcul8tr.label_date_from"></label>
                    <input class="date-input field-input" type="date" id="dateFrom" onchange="calcDate()">
                </div>
                <div class="conv-arrow">↔</div>
                <div class="field-group">
                    <label class="input-label" data-i18n="calcul8tr.label_date_to"></label>
                    <input class="date-input field-input" type="date" id="dateTo" onchange="calcDate()">
                </div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn" onclick="setToday()" data-i18n="calcul8tr.btn_today"></button>
        </div>
        <div class="result-section">
            <div class="result-header">
                <label class="input-label" style="color: var(--warning);">Ergebnis</label>
            </div>
            <div id="dateEmptyState" class="empty-state" data-i18n="calcul8tr.empty_date"></div>
            <div id="dateResultWrap" style="display:none;">
                <div class="date-result-grid" id="dateGrid"></div>
            </div>
        </div>
    </div>

</div>

<div class="toast-notify" id="toast"></div>

<footer>
    <div>
        <small>
            Calcul8tr <span data-version="calcul8tr"></span> |
            <a href="index.html" data-i18n="common.back"></a> |
            © 2022-2026 by
            <a href="https://github.com/AEYCEN">AEYCEN</a>
        </small>
    </div>
</footer>

<script src="js/calcul8tr.js"></script>
<script src="js/i18n.js"></script>
<script src="js/base.js"></script>
</body>
</html>
