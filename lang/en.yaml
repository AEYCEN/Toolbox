  title: GitLab UserScripts
  desc: Useful display extensions for GitLab via Tampermonkey
  guide_title: Instructions for Chrome
  guide_step1_html: 'Download the <a href="https://chromewebstore.google.com/detail/tampermonkey/dhdgffkkebhmkfjojejmpbldmpobfkfo" target="_blank">Tampermonkey browser extension</a>.'
