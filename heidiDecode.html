<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="heidiDecode.page_title">HeidiDecode | AEYCEN Toolbox</title>
    <link rel="icon" type="image/png" href="./assets/img/AEYCEN.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/toolbox-theme.css">
    <link rel="stylesheet" href="./styles/heidiDecode.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
<div class="app">

    <header class="header">
        <div class="logo">
            <span class="logo-href" onclick="window.location.href='index.html'">
                <img src="./assets/img/AEYCEN.png" alt="AEYCEN Logo" width="14">
                AEYCEN Toolbox
            </span>
        </div>
        <h1 data-i18n="heidiDecode.title"></h1>
        <p class="subtitle" data-i18n="heidiDecode.desc"></p>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-panel="direct" data-i18n="heidiDecode.tab_direct"></button>
        <button class="tab" data-panel="file" data-i18n="heidiDecode.tab_file"></button>
    </div>

    <!-- ═══════ PANEL: Direkteingabe ═══════ -->
    <div class="panel active" id="panel-direct">
        <div class="input-section">
            <label class="input-label" for="eingabe" data-i18n="heidiDecode.label_password"></label>
            <input class="field-input" type="text" id="eingabe" placeholder="unter Servers\<SERVERNAME>\Password">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="decodePassword()" data-i18n="heidiDecode.btn_decode"></button>
        </div>
        <div class="result-section">
            <div class="result-header">
                <label class="input-label" data-i18n="heidiDecode.label_result"></label>
            </div>
            <div id="directEmptyState" class="empty-state"><span data-i18n="heidiDecode.empty_direct"></span></div>
            <div id="directResult" style="display: none;">
                <div class="result-value-row">
                    <div class="result-accent result-value" id="solution"></div>
                    <button class="btn-copy-inline" onclick="copyText(document.getElementById('solution').textContent, this)" data-i18n="common.copy"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════ PANEL: Dateiextraktion ═══════ -->
    <div class="panel" id="panel-file">
        <div class="input-section">
            <label class="input-label" data-i18n="heidiDecode.label_file"></label>
            <div class="file-drop" id="fileDrop">
                <div class="file-drop-text">
                    Exportierte <span class="accent">.txt</span>-Datei hier ablegen oder <span class="accent">klicken</span>
                </div>
                <input type="file" id="fileInput" accept=".txt">
                <div class="file-name-display" id="fileName"></div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-accent3" onclick="openFile()" data-i18n="heidiDecode.btn_extract"></button>
        </div>
        <div class="result-section">
            <div class="result-header">
                <label class="input-label" style="color: var(--accent3);" data-i18n="heidiDecode.label_connections"></label>
            </div>
            <div id="fileEmptyState" class="empty-state" data-i18n="heidiDecode.empty_file"></div>
            <div class="connections-grid" id="connectionContainer"></div>
        </div>
    </div>

</div>

<div class="toast-notify" id="toast"></div>

<footer>
    <div>
        <small>
            HeidiDecode <span data-version="heidiDecode"></span> |
            <a href="index.html" data-i18n="common.back"></a> |
            © 2023-2026 by
            <a href="https://github.com/AEYCEN">AEYCEN</a>
        </small>
    </div>
</footer>

<script src="js/heidiDecode.js"></script>
<script src="js/i18n.js"></script>
<script src="js/base.js"></script>
</body>
</html>
